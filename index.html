<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>
/* ============================================================
   TOKENS — palette douce et romantique
   ============================================================ */
:root{
  --cream:        #fbf6f0;
  --cream-deep:   #f4eade;
  --beige:        #efe1d0;
  --pink:         #f2c9d3;
  --pink-soft:    #f8dde4;
  --pink-strong:  #e2a0b6;
  --rose-line:    #d98ca6;
  --gray:         #8c8177;
  --ink:          #4a3f3a;
  --white:        #ffffff;

  --paper:        #fbf5e9;
  --paper-deep:   #f2e7d3;
  --paper-ink:    #3d2f26;

  --font-display: 'EB Garamond', Georgia, 'Iowan Old Style', serif;
  --font-body:    -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  --font-letter:  'Cormorant Garamond', Georgia, serif;

  --shadow-soft:  0 10px 30px rgba(74,63,58,0.08);
  --shadow-tile:  0 4px 14px rgba(74,63,58,0.12);
  --radius-lg:    22px;
  --radius-md:    14px;
  --radius-sm:    8px;
}

*{ box-sizing:border-box; }

html,body{
  margin:0;
  padding:0;
  min-height:100%;
  background:var(--cream);
  color:var(--ink);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

body{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:6vh 5vw 10vh;
  min-height:100vh;
}

::selection{ background:var(--pink); color:var(--ink); }

:focus-visible{
  outline:3px solid var(--rose-line);
  outline-offset:3px;
  border-radius:6px;
}

/* ============================================================
   DÉCOR DE FOND — fixe, doux, jamais distrayant
   ============================================================ */
.bg-decor{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}

.corner-flower{
  position:absolute;
  width:min(42vw, 360px);
  height:min(42vw, 360px);
  opacity:0.30;
  filter:blur(1px);
}
.corner-flower.top-left{ top:-10%; left:-10%; }
.corner-flower.top-right{ top:-12%; right:-12%; transform:rotate(60deg); opacity:0.20; }
.corner-flower.bottom-right{ bottom:-10%; right:-10%; transform:rotate(180deg); }
.corner-flower.bottom-left{ bottom:-12%; left:-12%; transform:rotate(-70deg); opacity:0.18; }

.petal{
  position:absolute;
  width:46%;
  height:70%;
  background:radial-gradient(ellipse at 50% 20%, var(--pink-strong), var(--pink) 60%, transparent 75%);
  border-radius:60% 40% 65% 35% / 55% 45% 55% 45%;
  top:15%;
  left:27%;
  transform-origin:50% 100%;
}
.petal:nth-child(1){ transform:rotate(0deg); }
.petal:nth-child(2){ transform:rotate(72deg); }
.petal:nth-child(3){ transform:rotate(144deg); }
.petal:nth-child(4){ transform:rotate(216deg); }
.petal:nth-child(5){ transform:rotate(288deg); }
.flower-center{
  position:absolute;
  width:16%;
  height:16%;
  top:42%;
  left:42%;
  background:radial-gradient(circle, var(--pink-strong), var(--rose-line));
  border-radius:50%;
}

/* quelques pétales ambiants qui flottent très lentement, en permanence */
.ambient-petal{
  position:absolute;
  top:-6%;
  font-size:1rem;
  color:var(--pink-strong);
  opacity:0.35;
  animation-name:ambientFloat;
  animation-timing-function:linear;
  animation-iteration-count:infinite;
  filter:blur(0.3px);
}
@keyframes ambientFloat{
  0%{   transform:translateY(0) translateX(0) rotate(0deg); }
  50%{  transform:translateY(50vh) translateX(14px) rotate(160deg); }
  100%{ transform:translateY(108vh) translateX(-8px) rotate(320deg); }
}

/* ============================================================
   LAYOUT GÉNÉRAL
   ============================================================ */
.stage{
  position:relative;
  z-index:1;
  width:100%;
  max-width:560px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2.4rem;
}

.screen{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:1.6rem;
  animation:fadeIn .8s ease both;
}

@keyframes fadeIn{
  from{ opacity:0; transform:translateY(14px); }
  to{ opacity:1; transform:translateY(0); }
}

.hidden{ display:none !important; }

/* ============================================================
   EN-TÊTE / TITRE
   ============================================================ */
.title{
  font-family:var(--font-display);
  font-size:clamp(1.5rem, 4.4vw, 2.3rem);
  font-weight:400;
  letter-spacing:0.02em;
  text-align:center;
  color:var(--ink);
  margin:0;
}

.subtitle{
  font-family:var(--font-body);
  font-size:0.95rem;
  color:var(--gray);
  text-align:center;
  line-height:1.6;
  max-width:420px;
  margin:0;
}

/* ============================================================
   ÉCRAN "DATE GATE"
   ============================================================ */
.gate-card{
  background:var(--white);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-soft);
  padding:2.6rem 2rem;
  width:100%;
  max-width:420px;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:1.4rem;
}

.gate-icon{
  font-size:2rem;
  color:var(--pink-strong);
}

.gate-label{
  font-size:0.9rem;
  color:var(--gray);
  margin:0;
}

.gate-form{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:1rem;
  width:100%;
}

input[type="date"]{
  font-family:var(--font-body);
  font-size:1rem;
  color:var(--ink);
  background:var(--cream);
  border:1.5px solid var(--beige);
  border-radius:var(--radius-md);
  padding:0.85rem 1.1rem;
  width:100%;
  max-width:240px;
  transition:border-color .25s ease, box-shadow .25s ease;
}
input[type="date"]:hover{ border-color:var(--pink-strong); }
input[type="date"]:focus{
  border-color:var(--rose-line);
  box-shadow:0 0 0 4px rgba(217,140,166,0.15);
}

.btn{
  font-family:var(--font-body);
  font-size:0.95rem;
  font-weight:600;
  letter-spacing:0.02em;
  color:var(--white);
  background:linear-gradient(135deg, var(--pink-strong), var(--rose-line));
  border:none;
  border-radius:999px;
  padding:0.8rem 2.2rem;
  cursor:pointer;
  box-shadow:0 6px 16px rgba(217,140,166,0.35);
  transition:transform .2s ease, box-shadow .2s ease, filter .2s ease;
}
.btn:hover{ transform:translateY(-2px); filter:brightness(1.04); }
.btn:active{ transform:translateY(0); }

.gate-error{
  font-size:0.85rem;
  color:var(--rose-line);
  min-height:1.2em;
  margin:0;
  opacity:0;
  transition:opacity .25s ease;
}
.gate-error.show{ opacity:1; }

@keyframes shake{
  0%,100%{ transform:translateX(0); }
  20%{ transform:translateX(-8px); }
  40%{ transform:translateX(7px); }
  60%{ transform:translateX(-5px); }
  80%{ transform:translateX(4px); }
}
.shake{ animation:shake .45s ease; }

/* ============================================================
   PUZZLE
   ============================================================ */
.puzzle-wrapper{
  position:relative;
  width:min(90vw, 460px);
  aspect-ratio:1/1;
}

.puzzle-grid{
  display:grid;
  width:100%;
  height:100%;
  gap:6px;
  background:var(--beige);
  padding:6px;
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-soft);
  position:relative;
}

.tile{
  position:relative;
  border-radius:var(--radius-sm);
  cursor:pointer;
  overflow:hidden;
  box-shadow:var(--shadow-tile);
  transition:transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s ease, filter .25s ease;
  background-repeat:no-repeat;
  will-change:transform;
}
.tile:hover{ transform:scale(1.03); filter:brightness(1.03); }
.tile.selected{
  transform:scale(0.94);
  box-shadow:0 0 0 3px var(--rose-line), 0 0 18px rgba(217,140,166,0.55);
}
.tile.swap-hidden{ opacity:0; pointer-events:none; }
.tile.locked{ cursor:default; }
.tile.solved-pop{ animation:solvedPop .5s ease; }
@keyframes solvedPop{
  0%{ transform:scale(1); }
  40%{ transform:scale(1.05); }
  100%{ transform:scale(1); }
}

.tile-ghost{
  position:fixed;
  border-radius:var(--radius-sm);
  box-shadow:0 10px 26px rgba(74,63,58,0.28);
  z-index:50;
  pointer-events:none;
  background-repeat:no-repeat;
  will-change:transform;
  backface-visibility:hidden;
  transform:translateZ(0);
  transition:transform .55s cubic-bezier(.33,1,.68,1);
}

.puzzle-fadeout{
  animation:puzzleZoomOut var(--puzzle-fade-duration, 0.9s) ease forwards;
}
@keyframes puzzleZoomOut{
  0%{   transform:scale(1);    opacity:1; }
  55%{  transform:scale(1.05); opacity:1; }
  100%{ transform:scale(1.12); opacity:0; }
}

/* pluie de pétales de victoire — CSS uniquement */
.petal-rain{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
  z-index:40;
}
.falling-petal{
  position:absolute;
  top:-40px;
  font-size:1.3rem;
  color:var(--pink-strong);
  opacity:0.9;
  animation-name:fallDown;
  animation-timing-function:ease-in;
  animation-fill-mode:forwards;
}
@keyframes fallDown{
  0%{   transform:translateY(0) rotate(0deg);   opacity:0.9; }
  100%{ transform:translateY(110vh) rotate(340deg); opacity:0; }
}

/* ============================================================
   LETTRE — la scène de révélation
   ============================================================ */
.letter-stage{
  position:relative;
  width:100%;
  min-height:60vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:2vh;
}

.locked-card{
  background:var(--cream-deep);
  border:1.5px dashed var(--pink-strong);
  border-radius:var(--radius-lg);
  padding:2.2rem 1.6rem;
  width:100%;
  max-width:420px;
  text-align:center;
  color:var(--gray);
  font-size:1rem;
  letter-spacing:0.02em;
  margin:0 auto;
}

/* pétales pendant l'écriture — deux couches, devant / derrière la lettre */
.letter-petals{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
}
.letter-petals.behind{ z-index:2; }
.letter-petals.front{ z-index:6; }
.writing-petal{
  position:absolute;
  top:-5%;
  color:var(--pink-strong);
  opacity:0.5;
  filter:blur(0.3px);
  animation-name:writingPetalFall;
  animation-timing-function:linear;
  animation-fill-mode:forwards;
}
@keyframes writingPetalFall{
  0%{   transform:translateY(0) translateX(0) rotate(0deg); opacity:0; }
  8%{   opacity:0.55; }
  92%{  opacity:0.4; }
  100%{ transform:translateY(115vh) translateX(24px) rotate(200deg); opacity:0; }
}

/* la feuille de papier elle-même */
.letter-card{
  position:relative;
  z-index:5;
  display:none;
  width:700px;
  max-width:90vw;
  background:
    radial-gradient(ellipse at 20% 15%, rgba(255,255,255,0.55), transparent 55%),
    linear-gradient(165deg, var(--paper) 0%, var(--paper-deep) 100%);
  border-radius:3px 10px 4px 12px / 9px 4px 11px 3px;
  box-shadow:
    0 2px 4px rgba(61,47,38,0.10),
    0 18px 40px rgba(61,47,38,0.16),
    0 1px 0 rgba(255,255,255,0.4) inset;
  padding:3.4rem 3rem;
  opacity:0;
  transform:translateY(38vh) rotate(0deg);
  transition:
    opacity var(--letter-rise-duration, 1.1s) ease,
    transform var(--letter-rise-duration, 1.1s) cubic-bezier(.19,.9,.28,1);
}
.letter-card.revealed{
  opacity:1;
  /* --final-rotation is set inline in JS to a random value between -1deg and 1deg */
  transform:translateY(0) rotate(var(--final-rotation, 0deg));
}

/* grain de papier subtil */
.letter-card::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  opacity:0.5;
  mix-blend-mode:multiply;
  pointer-events:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='matrix' values='0 0 0 0 0.24  0 0 0 0 0.19  0 0 0 0 0.15  0 0 0 0.05 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  background-size:120px 120px;
}

/* bords très légèrement irréguliers, simulés en douceur */
.letter-card::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  pointer-events:none;
  box-shadow:
    inset 0 0 0 1px rgba(61,47,38,0.05),
    inset 0 0 18px rgba(61,47,38,0.03);
}

.letter-heart{
  text-align:center;
  color:var(--pink-strong);
  font-size:1.4rem;
  margin-bottom:1rem;
  opacity:0.85;
}

.letter-body{
  position:relative;
  font-family:var(--font-letter);
  font-size:1.4rem;
  line-height:1.95;
  color:var(--paper-ink);
  text-align:justify;
  white-space:pre-wrap;
  min-height:1.95em;
}

.type-cursor{
  display:inline-block;
  color:var(--rose-line);
  font-weight:400;
  animation:cursorBlink 1s step-start infinite;
}
.type-cursor.done{ display:none; }
@keyframes cursorBlink{
  0%, 49%{ opacity:1; }
  50%, 100%{ opacity:0; }
}

.letter-continue-wrap{
  display:flex;
  justify-content:center;
  margin-top:2.2rem;
  opacity:0;
  transform:translateY(14px);
  transition:opacity .7s ease, transform .7s cubic-bezier(.22,.68,.36,1);
  pointer-events:none;
}
.letter-continue-wrap.show{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width:520px){
  .gate-card, .locked-card{ padding:1.8rem 1.3rem; }
  .letter-card{ padding:2.2rem 1.5rem; }
  .letter-body{ font-size:1.2rem; }
}

@media (prefers-reduced-motion: reduce){
  *{
    animation-duration:0.001ms !important;
    animation-iteration-count:1 !important;
    transition-duration:0.001ms !important;
  }
}
</style>
</head>
<body>

<!-- Décor fixe : fleurs de cerisier dans les coins + pétales ambiants -->
<div class="bg-decor" aria-hidden="true" id="bgDecor">
  <div class="corner-flower top-left">
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div>
    <div class="flower-center"></div>
  </div>
  <div class="corner-flower top-right">
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div>
    <div class="flower-center"></div>
  </div>
  <div class="corner-flower bottom-right">
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div>
    <div class="flower-center"></div>
  </div>
  <div class="corner-flower bottom-left">
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div>
    <div class="flower-center"></div>
  </div>
  <!-- pétales ambiants injectés en JS -->
</div>

<main class="stage">

  <h1 class="title" id="mainTitle"></h1>
  <p class="subtitle" id="mainSubtitle"></p>

  <!-- ÉCRAN 1 : la porte de la date -->
  <section class="screen" id="gateScreen">
    <div class="gate-card">
      <div class="gate-icon" aria-hidden="true">♡</div>
      <p class="gate-label">Quelle est la date qui compte, pour nous ?</p>
      <form class="gate-form" id="gateForm">
        <input
          type="date"
          id="dateInput"
          aria-label="Entrer la date"
          required
        >
        <button type="submit" class="btn">Entrer</button>
        <p class="gate-error" id="gateError">Ce n'est pas encore la bonne date... essaie encore ♡</p>
      </form>
    </div>
  </section>

  <!-- ÉCRAN 2 : le puzzle (caché au départ) -->
  <section class="screen hidden" id="puzzleScreen">
    <div class="puzzle-wrapper" id="puzzleWrapper">
      <div class="puzzle-grid" id="puzzleGrid"></div>
    </div>

    <div class="letter-stage" id="letterStage">
      <div class="locked-card" id="lockedCard">🔒 Locked</div>
      <!-- couches de pétales pendant l'écriture -->
      <div class="letter-petals behind" id="petalsBehind"></div>
      <article class="letter-card" id="letterCard">
        <div class="letter-heart" aria-hidden="true">♡</div>
        <div class="letter-body" id="letterBody"><span id="letterText"></span><span class="type-cursor" id="typeCursor">|</span></div>
        <div class="letter-continue-wrap" id="continueWrap">
          <button type="button" class="btn" id="continueBtn">Continue ♡</button>
        </div>
      </article>
      <div class="letter-petals front" id="petalsFront"></div>
    </div>
  </section>

</main>

<script>
/* ==========================================================================
   CONFIG — toutes les vitesses et délais regroupés ici
   ========================================================================== */
const CONFIG = {
  rows: 4,
  cols: 4,
  image: "photo.jpg",
  title: "solve our little picture ♡",
  subtitle: 
  lockedText: "🔒 Locked",

  // Date à deviner pour ouvrir la page (format AAAA-MM-JJ)
  requiredDate: "2025-07-13",
  gateWrongMessage: "Ce n'est pas encore la bonne date... essaie encore ♡",

  // --- Timings de la scène de la lettre ---
  puzzleFadeDuration: 900,      // ms — disparition du puzzle en fondu (avec léger zoom)
  letterRiseDelay: 250,         // ms — délai avant que la lettre commence à monter
  letterRiseDuration: 1100,     // ms — durée de la montée + apparition de la lettre
  typingStartDelay: 350,        // ms — pause avant le début de l'écriture, une fois la lettre posée
  typingCharsPerSecond: 32,     // 25–40 caractères / seconde
  typingJitter: 0.35,           // variation aléatoire du rythme (0 = régulier, 1 = très irrégulier)
  continueButtonDelay: 500,     // ms — délai avant l'apparition du bouton, une fois l'écriture finie

  // --- Pétales ---
  ambientPetalCount: 6,         // pétales de fond, en continu, très lents
  writingPetalCount: 5,         // pétales pendant l'écriture de la lettre (peu, lents)
  writingPetalSpawnInterval: 1400 // ms — intervalle entre deux pétales pendant l'écriture
};

// Musique en option (désactivée par défaut)
const ENABLE_MUSIC = false;
const MUSIC_SRC = "music.mp3";

/* ==========================================================================
   LETTRE — à modifier ici, uniquement cette variable
   ========================================================================== */
const LETTER = `My love,

Every day with you feels like a little miracle I get to unwrap all over again.

You are the calm in my noisy days, the laugh I look forward to, the hand I want to hold through everything ordinary and everything extraordinary.

This little puzzle was never really about the picture. It was just an excuse to make you smile for a few minutes, the same way you make me smile every single day.

Thank you for choosing me, again and again.

Forever yours.`;

/* ==========================================================================
   INITIALISATION DU TEXTE D'EN-TÊTE
   ========================================================================== */
document.getElementById("mainTitle").textContent = CONFIG.title;
document.getElementById("mainSubtitle").textContent = CONFIG.subtitle;
document.getElementById("lockedCard").textContent = CONFIG.lockedText;
document.documentElement.style.setProperty("--puzzle-fade-duration", (CONFIG.puzzleFadeDuration / 1000) + "s");
document.documentElement.style.setProperty("--letter-rise-duration", (CONFIG.letterRiseDuration / 1000) + "s");

/* ==========================================================================
   PÉTALES AMBIANTS DE FOND (permanents, très lents, discrets)
   ========================================================================== */
(function spawnAmbientPetals(){
  const layer = document.getElementById("bgDecor");
  const symbols = ["❀", "✿", "♡"];
  for (let i = 0; i < CONFIG.ambientPetalCount; i++) {
    const p = document.createElement("span");
    p.className = "ambient-petal";
    p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    p.style.left = (Math.random() * 96 + 2) + "vw";
    const duration = 26 + Math.random() * 18; // très lent
    p.style.animationDuration = duration + "s";
    p.style.animationDelay = (-Math.random() * duration) + "s";
    p.style.fontSize = (0.8 + Math.random() * 0.7) + "rem";
    layer.appendChild(p);
  }
})();

/* ==========================================================================
   ÉTAPE 1 : LA PORTE DE LA DATE
   ========================================================================== */
const gateScreen  = document.getElementById("gateScreen");
const puzzleScreen= document.getElementById("puzzleScreen");
const gateForm    = document.getElementById("gateForm");
const dateInput   = document.getElementById("dateInput");
const gateError   = document.getElementById("gateError");
const gateCard    = document.querySelector(".gate-card");

gateError.textContent = CONFIG.gateWrongMessage;

gateForm.addEventListener("submit", function (e) {
  e.preventDefault();

  if (dateInput.value === CONFIG.requiredDate) {
    gateScreen.classList.add("hidden");
    puzzleScreen.classList.remove("hidden");
    initPuzzle();
    maybeStartMusic();
  } else {
    gateError.classList.add("show");
    gateCard.classList.remove("shake");
    void gateCard.offsetWidth;
    gateCard.classList.add("shake");
  }
});

/* ==========================================================================
   MUSIQUE (optionnelle)
   ========================================================================== */
let musicStarted = false;
let audioEl = null;

function maybeStartMusic() {
  if (!ENABLE_MUSIC || musicStarted) return;
  audioEl = new Audio(MUSIC_SRC);
  audioEl.loop = true;
  audioEl.volume = 0.5;
  const startOnce = () => {
    if (musicStarted) return;
    musicStarted = true;
    audioEl.play().catch(() => {});
    document.removeEventListener("click", startOnce);
    document.removeEventListener("keydown", startOnce);
  };
  document.addEventListener("click", startOnce);
  document.addEventListener("keydown", startOnce);
}

/* ==========================================================================
   ÉTAPE 2 : LE PUZZLE (échange de deux cases, pas de case vide)
   ========================================================================== */
const grid    = document.getElementById("puzzleGrid");
const wrapper = document.getElementById("puzzleWrapper");

const rows = CONFIG.rows;
const cols = CONFIG.cols;
const total = rows * cols;

let positions = [];
let selectedIndex = null;
let locked = false;

function initPuzzle() {
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
  grid.innerHTML = "";

  positions = Array.from({ length: total }, (_, i) => i);
  shufflePositions();

  for (let i = 0; i < total; i++) {
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.tabIndex = 0;
    tile.setAttribute("role", "button");
    tile.setAttribute("aria-label", "Pièce du puzzle");
    tile.dataset.position = i;

    tile.addEventListener("click", () => handleTileActivate(i));
    tile.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        handleTileActivate(i);
      }
    });

    grid.appendChild(tile);
  }

  renderAllTiles();
}

function shufflePositions() {
  const shuffleCount = total * 6;
  do {
    for (let k = 0; k < shuffleCount; k++) {
      const a = Math.floor(Math.random() * total);
      const b = Math.floor(Math.random() * total);
      [positions[a], positions[b]] = [positions[b], positions[a]];
    }
  } while (isSolved());
}

function pieceBackgroundStyle(pieceIndex) {
  const pieceRow = Math.floor(pieceIndex / cols);
  const pieceCol = pieceIndex % cols;
  const posX = cols > 1 ? (pieceCol / (cols - 1)) * 100 : 0;
  const posY = rows > 1 ? (pieceRow / (rows - 1)) * 100 : 0;
  return {
    backgroundImage: `url("${CONFIG.image}")`,
    backgroundSize: `${cols * 100}% ${rows * 100}%`,
    backgroundPosition: `${posX}% ${posY}%`
  };
}

function applyTileStyle(tileEl, pieceIndex) {
  const style = pieceBackgroundStyle(pieceIndex);
  tileEl.style.backgroundImage = style.backgroundImage;
  tileEl.style.backgroundSize = style.backgroundSize;
  tileEl.style.backgroundPosition = style.backgroundPosition;
  tileEl.dataset.piece = pieceIndex;
}

function renderAllTiles() {
  const tiles = grid.children;
  for (let i = 0; i < total; i++) {
    applyTileStyle(tiles[i], positions[i]);
  }
}

function isSolved() {
  return positions.every((pieceIndex, i) => pieceIndex === i);
}

/* ------------------ Sélection et échange (avec animation "vol") ------------------ */
function handleTileActivate(index) {
  if (locked || isAnimating) return;
  const tiles = grid.children;
  const tileEl = tiles[index];

  if (selectedIndex === null) {
    selectedIndex = index;
    tileEl.classList.add("selected");
    return;
  }

  if (selectedIndex === index) {
    tileEl.classList.remove("selected");
    selectedIndex = null;
    return;
  }

  const firstIndex = selectedIndex;
  selectedIndex = null;
  tiles[firstIndex].classList.remove("selected");

  swapWithAnimation(firstIndex, index);
}

let isAnimating = false;

function swapWithAnimation(indexA, indexB) {
  isAnimating = true;

  const tiles = grid.children;
  const tileA = tiles[indexA];
  const tileB = tiles[indexB];

  const rectA = tileA.getBoundingClientRect();
  const rectB = tileB.getBoundingClientRect();

  const ghostA = createGhost(tileA, rectA);
  const ghostB = createGhost(tileB, rectB);
  ghostA.style.transform = "translate(0px, 0px)";
  ghostB.style.transform = "translate(0px, 0px)";
  document.body.appendChild(ghostA);
  document.body.appendChild(ghostB);

  tileA.classList.add("swap-hidden");
  tileB.classList.add("swap-hidden");

  [positions[indexA], positions[indexB]] = [positions[indexB], positions[indexA]];
  applyTileStyle(tileA, positions[indexA]);
  applyTileStyle(tileB, positions[indexB]);

  const dxAtoB = rectB.left - rectA.left;
  const dyAtoB = rectB.top - rectA.top;
  const dxBtoA = rectA.left - rectB.left;
  const dyBtoA = rectA.top - rectB.top;

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      ghostA.style.transform = `translate(${dxAtoB}px, ${dyAtoB}px) scale(1.05) rotate(3deg)`;
      ghostB.style.transform = `translate(${dxBtoA}px, ${dyBtoA}px) scale(1.05) rotate(-3deg)`;
    });
  });

  let finished = 0;
  const onDone = (e) => {
    if (e.propertyName && e.propertyName !== "transform") return;
    finished++;
    if (finished < 2) return;
    ghostA.remove();
    ghostB.remove();
    tileA.classList.remove("swap-hidden");
    tileB.classList.remove("swap-hidden");
    tileA.classList.add("solved-pop");
    tileB.classList.add("solved-pop");
    setTimeout(() => {
      tileA.classList.remove("solved-pop");
      tileB.classList.remove("solved-pop");
    }, 500);

    isAnimating = false;
    checkWin();
  };

  ghostA.addEventListener("transitionend", onDone, { once: true });
  ghostB.addEventListener("transitionend", onDone, { once: true });
}

function createGhost(sourceTile, rect) {
  const ghost = document.createElement("div");
  ghost.className = "tile-ghost";
  ghost.style.left = rect.left + "px";
  ghost.style.top = rect.top + "px";
  ghost.style.width = rect.width + "px";
  ghost.style.height = rect.height + "px";
  ghost.style.backgroundImage = sourceTile.style.backgroundImage;
  ghost.style.backgroundSize = sourceTile.style.backgroundSize;
  ghost.style.backgroundPosition = sourceTile.style.backgroundPosition;
  return ghost;
}

/* ------------------ Victoire ------------------ */
function checkWin() {
  if (!isSolved()) return;
  locked = true;

  const tiles = Array.from(grid.children);
  tiles.forEach(t => t.classList.add("locked"));

  spawnPetalRain();

  wrapper.classList.add("puzzle-fadeout");

  setTimeout(() => {
    wrapper.style.display = "none";
    revealLetterScene();
  }, CONFIG.puzzleFadeDuration);
}

function spawnPetalRain() {
  const rain = document.createElement("div");
  rain.className = "petal-rain";
  document.body.appendChild(rain);

  const symbols = ["♡", "❀", "✿", "♥"];
  const count = 26;

  for (let i = 0; i < count; i++) {
    const p = document.createElement("span");
    p.className = "falling-petal";
    p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    p.style.left = Math.random() * 100 + "vw";
    const duration = 2.2 + Math.random() * 1.6;
    const delay = Math.random() * 0.6;
    p.style.animationDuration = duration + "s";
    p.style.animationDelay = delay + "s";
    p.style.fontSize = (1 + Math.random() * 1.2) + "rem";
    rain.appendChild(p);
  }

  setTimeout(() => rain.remove(), 4500);
}

/* ==========================================================================
   ÉTAPE 3 : LA SCÈNE DE LA LETTRE
   ========================================================================== */
const lockedCard    = document.getElementById("lockedCard");
const letterCard    = document.getElementById("letterCard");
const letterTextEl  = document.getElementById("letterText");
const typeCursor    = document.getElementById("typeCursor");
const continueWrap  = document.getElementById("continueWrap");
const continueBtn   = document.getElementById("continueBtn");
const petalsBehind  = document.getElementById("petalsBehind");
const petalsFront   = document.getElementById("petalsFront");

let writingPetalTimer = null;

function revealLetterScene() {
  // la case "verrouillée" s'efface en douceur
  lockedCard.style.transition = "opacity .4s ease";
  lockedCard.style.opacity = "0";

  setTimeout(() => {
    lockedCard.style.display = "none";

    // rotation finale aléatoire entre -1deg et +1deg, façon feuille posée
    const finalRotation = (Math.random() * 2 - 1).toFixed(2) + "deg";
    letterCard.style.setProperty("--final-rotation", finalRotation);

    letterCard.style.display = "block";

    // on force le rendu de l'état de départ (translateY + opacity 0)
    // avant de déclencher la transition vers l'état final
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        letterCard.classList.add("revealed");
      });
    });

    // les pétales commencent à tomber doucement dès que la lettre apparaît
    startWritingPetals();

    setTimeout(() => {
      startTypewriter();
    }, CONFIG.letterRiseDelay + CONFIG.letterRiseDuration + CONFIG.typingStartDelay);

  }, 400);
}

function startWritingPetals() {
  const symbols = ["❀", "✿"];
  let spawned = 0;

  function spawnOne() {
    if (spawned >= CONFIG.writingPetalCount * 4) return; // limite raisonnable dans la durée
    spawned++;
    const front = Math.random() < 0.5;
    const layer = front ? petalsFront : petalsBehind;
    const p = document.createElement("span");
    p.className = "writing-petal";
    p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    p.style.left = (Math.random() * 90 + 5) + "vw";
    p.style.fontSize = (0.9 + Math.random() * 0.8) + "rem";
    const duration = 9 + Math.random() * 6; // lent, presque imperceptible
    p.style.animationDuration = duration + "s";
    layer.appendChild(p);
    setTimeout(() => p.remove(), duration * 1000 + 200);
  }

  spawnOne();
  writingPetalTimer = setInterval(spawnOne, CONFIG.writingPetalSpawnInterval);
}

function stopWritingPetals() {
  if (writingPetalTimer) {
    clearInterval(writingPetalTimer);
    writingPetalTimer = null;
  }
}

function startTypewriter() {
  const chars = Array.from(LETTER);
  let i = 0;
  const baseInterval = 1000 / CONFIG.typingCharsPerSecond;

  function typeNext() {
    if (i >= chars.length) {
      typeCursor.classList.add("done");
      stopWritingPetals();
      setTimeout(showContinueButton, CONFIG.continueButtonDelay);
      return;
    }
    letterTextEl.textContent += chars[i];
    i++;

    const jitterFactor = 1 + (Math.random() * 2 - 1) * CONFIG.typingJitter;
    const delay = Math.max(8, baseInterval * jitterFactor);
    setTimeout(typeNext, delay);
  }

  typeNext();
}

function showContinueButton() {
  continueWrap.classList.add("show");
}

continueBtn.addEventListener("click", () => {
  // point d'accroche pour la suite de l'expérience —
  // pour l'instant, un petit remerciement discret
  continueBtn.disabled = true;
  continueBtn.textContent = "♡";
});
</script>
